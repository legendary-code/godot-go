name: CI

# Run on every push to main and on pull requests targeting main. Skip
# pure-doc edits to keep the matrix from churning over README tweaks
# (the path filter intentionally only excludes top-level docs and the
# docs/ tree — anything under examples/ or internal/ is real code
# that affects the build).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - '.claude/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - '.claude/**'
  workflow_dispatch: {}

# Cancel in-flight runs on the same ref when a new commit lands —
# stops PR pushes from queueing up redundant matrix expansions.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Match go.mod's toolchain. setup-go resolves arbitrary versions.
  GO_VERSION: '1.26.1'

jobs:
  build-and-verify:
    name: ${{ matrix.os }} / godot ${{ matrix.godot.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Pinned Godot releases × the matching extension_api JSON file.
        # Each matrix cell builds bindings against `api`, runs that
        # version's Godot binary, and verifies the example scripts
        # pass — proves the framework loads cleanly across every
        # supported Godot version. Bump `compatibility_minimum` in
        # each example's .gdextension if you need to drop an old
        # version, or add a new entry here when a Godot release lands.
        godot:
          - { label: '4.4', release: '4.4.1-stable', api: '4_4' }
          - { label: '4.5', release: '4.5-stable',   api: '4_5' }
          - { label: '4.6', release: '4.6.2-stable', api: '4_6' }

    defaults:
      run:
        # bash on every runner — Windows includes Git Bash, which
        # handles the install script and the godot wrapper uniformly.
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # The default cache key (go.sum) is fine; this project has
          # no third-party Go dependencies, but the cache action is
          # cheap to keep enabled.
          cache: true

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          # Cache by OS + version so each runner pulls its own image
          # but skips re-downloading on subsequent runs at the same
          # version. The install script idempotently writes here.
          path: ${{ runner.tool_cache }}/godot/${{ matrix.godot.release }}
          key: godot-${{ runner.os }}-${{ matrix.godot.release }}

      - name: Install Godot
        # Invoked via `bash` explicitly so the script's executable bit
        # isn't a hard requirement — Windows runners can't preserve
        # +x on commit, and `git update-index --chmod=+x` only papers
        # over the case where the script was committed from POSIX.
        run: bash .github/scripts/install-godot.sh "${{ matrix.godot.release }}"

      - name: Generate framework bindings
        # godot/ ships only the versioned extension_api_*.json files
        # plus the //go:generate trigger; the *.gen.go files are
        # produced fresh from the JSON matching this matrix cell.
        # Must run before `go test` / `go build` so the package isn't
        # empty. We invoke the bindgen directly (rather than via go
        # generate) so the matrix dimension picks the JSON.
        run: |
          go run ./cmd/godot-go-bindgen \
            -api ./godot/extension_api_${{ matrix.godot.api }}.json \
            -out ./godot \
            -package godot \
            -import-path github.com/legendary-code/godot-go/godot

      - name: Go test
        run: go test ./...

      - name: Install codegen
        run: go install ./cmd/godot-go

      - name: Generate + build smoke
        run: |
          go generate ./examples/smoke/...
          mkdir -p examples/smoke/godot_project/bin
          # Output suffix matches what the .gdextension config
          # expects per platform; the install-godot wrapper also
          # adapts to OS, but here we hand-pick by RUNNER_OS so the
          # output filename hits whatever the host can load.
          case "$RUNNER_OS" in
            Linux)   ext=so ;;
            macOS)   ext=dylib ;;
            Windows) ext=dll ;;
          esac
          go build -buildmode=c-shared -o "examples/smoke/godot_project/bin/godot_go_smoke.${ext}" ./examples/smoke

      - name: Generate + build locale_language
        run: |
          go generate ./examples/locale_language/...
          mkdir -p examples/locale_language/godot_project/bin
          case "$RUNNER_OS" in
            Linux)   ext=so ;;
            macOS)   ext=dylib ;;
            Windows) ext=dll ;;
          esac
          go build -buildmode=c-shared -o "examples/locale_language/godot_project/bin/godot_go_locale_language.${ext}" ./examples/locale_language

      - name: Generate + build 2d_demo
        run: |
          go generate ./examples/2d_demo/...
          mkdir -p examples/2d_demo/godot_project/bin
          case "$RUNNER_OS" in
            Linux)   ext=so ;;
            macOS)   ext=dylib ;;
            Windows) ext=dll ;;
          esac
          go build -buildmode=c-shared -o "examples/2d_demo/godot_project/bin/godot_go_2d_demo.${ext}" ./examples/2d_demo

      # Each example needs a one-shot --editor pass before its
      # headless --script run so Godot generates the project's
      # .godot/ cache and recognizes the .gdextension. Running with
      # --quit-after 5 keeps the editor session bounded.
      #
      # The framework's Core-deinit os.Exit hook (see
      # internal/gdextension/shutdown.go) is necessary on Windows
      # to dodge Go's auxiliary-thread race against
      # DLL_PROCESS_DETACH, but it side-effects the engine's
      # post-deinit teardown across platforms — Godot logs "BUG:
      # Unreferenced static string" on every OS, and on macOS the
      # uncaught-exception path during teardown can SIGABRT the
      # process AFTER our test has already passed.
      #
      # The "ALL CHECKS PASSED" log line is therefore the source of
      # truth, NOT the engine process's exit code. We capture
      # output to a file (`|| true` swallows the post-test abort),
      # echo it for the action log, and grep for the success line.
      # If the framework genuinely crashed mid-test, the line won't
      # appear and grep fails the step.

      - name: Import + verify smoke
        run: |
          godot --headless --editor --path examples/smoke/godot_project --quit-after 5 > /dev/null 2>&1 || true
          godot --headless --path examples/smoke/godot_project --script test_mynode.gd > smoke.log 2>&1 || true
          cat smoke.log
          grep -F "test_mynode: ALL CHECKS PASSED" smoke.log

      - name: Import + verify locale_language
        run: |
          godot --headless --editor --path examples/locale_language/godot_project --quit-after 5 > /dev/null 2>&1 || true
          godot --headless --path examples/locale_language/godot_project --script test_locale_language.gd > locale.log 2>&1 || true
          cat locale.log
          grep -F "test_locale_language: ALL CHECKS PASSED" locale.log

      - name: Import + verify 2d_demo
        run: |
          godot --headless --editor --path examples/2d_demo/godot_project --quit-after 5 > /dev/null 2>&1 || true
          godot --headless --path examples/2d_demo/godot_project --script test_mover.gd > mover.log 2>&1 || true
          cat mover.log
          grep -F "test_mover: ALL CHECKS PASSED" mover.log
