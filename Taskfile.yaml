version: '3'

vars:
  EXAMPLE_PKG: ./examples/smoke
  EXAMPLE_OUT_DIR: examples/smoke/godot_project/bin
  EXAMPLE_LIB_NAME: godot_go_smoke
  LIB_EXT:
    sh: |
      case "{{OS}}" in
        windows) echo .dll ;;
        darwin)  echo .dylib ;;
        *)       echo .so ;;
      esac

tasks:
  default:
    cmds:
      - task --list

  test:
    desc: Run the Go test suite.
    cmds:
      - go test ./...

  generate:types:
    desc: Regenerate framework bindings from godot/extension_api.json into variant/, core/, etc.
    cmds:
      - go run ./cmd/godot-go-bindgen -api godot/extension_api.json -out . -build-config float_32
    sources:
      - godot/extension_api.json
      - cmd/godot-go-bindgen/**/*.go
    generates:
      - variant/*.gen.go

  build:example:
    desc: Build the Phase 0 smoke extension as a c-shared library.
    cmds:
      - mkdir -p {{.EXAMPLE_OUT_DIR}}
      - go build -buildmode=c-shared -o {{.EXAMPLE_OUT_DIR}}/{{.EXAMPLE_LIB_NAME}}{{.LIB_EXT}} {{.EXAMPLE_PKG}}
    sources:
      - examples/smoke/**/*.go
      - internal/**/*.go
      - internal/**/*.h
      - godot/gdextension_interface.h
    generates:
      - '{{.EXAMPLE_OUT_DIR}}/{{.EXAMPLE_LIB_NAME}}{{.LIB_EXT}}'

  example:
    desc: Alias for build:example.
    cmds:
      - task: build:example
