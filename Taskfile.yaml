version: '3'

vars:
  EXAMPLE_PKG: ./examples/smoke
  EXAMPLE_OUT_DIR: examples/smoke/godot_project/bin
  EXAMPLE_LIB_NAME: godot_go_smoke
  LIB_EXT:
    sh: |
      case "{{OS}}" in
        windows) echo .dll ;;
        darwin)  echo .dylib ;;
        *)       echo .so ;;
      esac

tasks:
  default:
    cmds:
      - task --list

  test:
    desc: Run the Go test suite.
    deps: [generate:bindings]
    cmds:
      - go test ./...

  generate:bindings:
    desc: Generate the godot/ bindings package from godot/extension_api.json.
    cmds:
      - go generate ./godot/...
    sources:
      - godot/extension_api.json
      - godot/generate_bindings.go
      - cmd/godot-go-bindgen/**/*.go
    generates:
      - godot/*.gen.go
      - godot/runtime/runtime.gen.go

  build:example:
    desc: Build the smoke extension as a c-shared library.
    deps: [generate:bindings]
    cmds:
      - mkdir -p {{.EXAMPLE_OUT_DIR}}
      - go build -buildmode=c-shared -o {{.EXAMPLE_OUT_DIR}}/{{.EXAMPLE_LIB_NAME}}{{.LIB_EXT}} {{.EXAMPLE_PKG}}
    sources:
      - examples/smoke/**/*.go
      - godot/*.gen.go
      - godot/runtime/runtime.gen.go
      - gdextension/**/*.go
      - gdextension/**/*.h
      - godot/gdextension_interface.h
    generates:
      - '{{.EXAMPLE_OUT_DIR}}/{{.EXAMPLE_LIB_NAME}}{{.LIB_EXT}}'

  build:locale_language:
    desc: Build the locale_language example (the canonical doctag showcase).
    deps: [generate:bindings]
    vars:
      OUT_DIR: examples/locale_language/godot_project/bin
      LIB_NAME: godot_go_locale_language
    cmds:
      - go install ./cmd/godot-go
      - go generate ./examples/locale_language/...
      - mkdir -p {{.OUT_DIR}}
      - go build -buildmode=c-shared -o {{.OUT_DIR}}/{{.LIB_NAME}}{{.LIB_EXT}} ./examples/locale_language
    sources:
      - examples/locale_language/**/*.go
      - cmd/godot-go/**/*.go
      - godot/*.gen.go
      - godot/runtime/runtime.gen.go
      - gdextension/**/*.go
      - gdextension/**/*.h
      - godot/gdextension_interface.h
    generates:
      - 'examples/locale_language/godot_project/bin/godot_go_locale_language{{.LIB_EXT}}'

  build:2d_demo:
    desc: Build the 2d_demo example — Node2D extension that oscillates a sprite via Process(delta).
    deps: [generate:bindings]
    vars:
      OUT_DIR: examples/2d_demo/godot_project/bin
      LIB_NAME: godot_go_2d_demo
    cmds:
      - go install ./cmd/godot-go
      - go generate ./examples/2d_demo/...
      - mkdir -p {{.OUT_DIR}}
      - go build -buildmode=c-shared -o {{.OUT_DIR}}/{{.LIB_NAME}}{{.LIB_EXT}} ./examples/2d_demo
    sources:
      - examples/2d_demo/**/*.go
      - cmd/godot-go/**/*.go
      - godot/*.gen.go
      - godot/runtime/runtime.gen.go
      - gdextension/**/*.go
      - gdextension/**/*.h
      - godot/gdextension_interface.h
    generates:
      - 'examples/2d_demo/godot_project/bin/godot_go_2d_demo{{.LIB_EXT}}'

  example:
    desc: Alias for build:example.
    cmds:
      - task: build:example
